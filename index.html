<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>元素週期表互動式學習</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="hero">
    <div>
      <h1>元素週期表互動式學習</h1>
      <p>點擊元素方塊，查看原子量、應用、常見化合物與課堂重點。內容設計對齊國中至高中自然／化學常見學習主題。</p>
      <div class="toolbar">
        <input id="searchInput" type="search" placeholder="搜尋元素：中文、英文、符號、原子序">
        <select id="familyFilter">
          <option value="all">全部族群</option>
        </select>
        <button id="randomBtn">隨機抽元素</button>
        <button id="resetBtn">重設</button>
      </div>
    </div>
    <div class="legend" id="legend"></div>
  </header>

  <main class="layout">
    <section>
      <div class="table-wrap">
        <div class="table-grid" id="periodicTable"></div>
      </div>
      <div class="series-note">
        <span>鑭系元素</span> 與 <span>錒系元素</span> 置於下方兩列，點擊後會在右側顯示詳細資訊。
      </div>
    </section>

    <aside class="detail-panel" id="detailPanel">
      <div class="placeholder">
        <div class="placeholder-icon">🧪</div>
        <h2>請先點選一個元素</h2>
        <p>例如：碳、氧、鈉、鐵、銅、矽。</p>
      </div>
    </aside>
  </main>

  <section class="quiz-section">
    <div class="quiz-card">
      <h2>快速挑戰</h2>
      <p>按下按鈕，系統會隨機出一道與元素用途或族群相關的小題目。</p>
      <button id="quizBtn">開始挑戰</button>
      <div id="quizArea"></div>
    </div>
  </section>

  <footer class="footer">
    <p>建議部署：GitHub Pages。資料來源建議：IUPAC、PubChem、Royal Society of Chemistry、臺灣自然科學領域課綱。</p>
  </footer>

  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
